<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关注 - 马太Matthew</title>
  <link rel="icon" type="image/png" href="images/profile.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 页面容器 */
    .subscribe-container {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    /* 个人资料卡片 */
    .profile-card {
      background-color: #1a1a1a;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      color: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    /* 个人资料头部 */
    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    /* 头像 */
    .profile-avatar {
      width: 60px;
      height: 60px;
      margin-right: 1rem;
    }
    
    /* 个人信息 */
    .profile-info {
      flex: 1;
    }
    
    /* 用户名 */
    .profile-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin: 0 0 0.25rem 0;
    }
    
    /* 状态信息 */
    .profile-status {
      font-size: 0.9rem;
      color: #aaa;
      margin: 0;
    }
    
    /* 发消息按钮 */
    .message-btn {
      background-color: transparent;
      border: 1px solid #666;
      color: white;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .message-btn:hover {
      background-color: #333;
    }
    
    /* 关注按钮 */
    .subscribe-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    
    .subscribe-btn:hover {
      background-color: #0069d9;
    }
    
    /* 已关注状态 */
    .subscribe-btn.subscribed {
      background-color: #6c757d;
      cursor: default;
    }
    
    /* 自定义光标 */
    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease-out;
      mix-blend-mode: difference;
    }
  </style>
</head>
<body>
  <!-- 顶栏 -->
  <nav class="top-bar">
    <div class="top-bar-content">
      <a href="index.html" class="top-bar-logo">
        <img src="images/profile.png" alt="马太Matthew">
        <span>马太Matthew</span>
      </a>
      <div class="top-bar-nav">
        <a href="index.html">主页</a>
        <a href="subscribe.html" class="active">关注</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- 关注区域 -->
    <div class="subscribe-container">
      <div class="profile-card">
        <div class="profile-header">
          <img src="images/profile.png" alt="马太Matthew" class="profile-avatar">
          <div class="profile-info">
            <h2 class="profile-name">马太Matthew</h2>
            <p class="profile-status">随缘更新，但不停更。</p>
          </div>
          <button class="message-btn">发消息</button>
        </div>
        <button class="subscribe-btn" id="subscribeBtn">+ 关注</button>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
      <p>© <span id="year"></span> 马太Matthew</p>
    </footer>
  </div>

  <script>
    // 更新年份
    document.getElementById('year').textContent = new Date().getFullYear();

    // 创建自定义光标
    const cursor = document.createElement('div');
    cursor.classList.add('custom-cursor');
    document.body.appendChild(cursor);

    // 光标位置
    let cursorX = 0;
    let cursorY = 0;
    let targetX = 0;
    let targetY = 0;

    // 更新光标位置
    function updateCursor() {
      cursorX += (targetX - cursorX) * 0.1;
      cursorY += (targetY - cursorY) * 0.1;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(updateCursor);
    }

    // 自动光标动画
    function autoCursorAnimation() {
      const subscribeBtn = document.getElementById('subscribeBtn');
      if (!subscribeBtn) return;
      
      const btnRect = subscribeBtn.getBoundingClientRect();
      const btnCenterX = btnRect.left + btnRect.width / 2;
      const btnCenterY = btnRect.top + btnRect.height / 2;
      
      // 动画参数
      let step = 0;
      const moveSteps = 150;      // 移动步骤数
      const pauseSteps = 60;      // 停顿步骤数
      const clickPauseSteps = 30; // 点击后停顿步骤数
      
      const animationInterval = setInterval(() => {
        step++;
        
        if (step <= moveSteps) {
          // 1. 从右侧移动到中间（按钮位置）
          const progress = step / moveSteps;
          // 从屏幕右侧外进入，移动到按钮中心
          targetX = window.innerWidth + 50 - (window.innerWidth + 100 - btnCenterX) * progress;
          targetY = btnCenterY - 10;
        } else if (step > moveSteps && step <= moveSteps + pauseSteps) {
          // 2. 停下，停留在按钮上
          targetX = btnCenterX - 10;
          targetY = btnCenterY - 10;
        } else if (step === moveSteps + pauseSteps + 1) {
          // 3. 按按钮
          subscribeBtn.click();
        } else if (step > moveSteps + pauseSteps + 1 && step <= moveSteps + pauseSteps + 1 + clickPauseSteps) {
          // 4. 停顿，显示按钮状态变化
          targetX = btnCenterX - 10;
          targetY = btnCenterY - 10;
        } else if (step > moveSteps + pauseSteps + 1 + clickPauseSteps && step <= moveSteps * 2 + pauseSteps + 1 + clickPauseSteps) {
          // 5. 移动到左侧
          const progress = (step - (moveSteps + pauseSteps + 1 + clickPauseSteps)) / moveSteps;
          // 从按钮中心移动到屏幕左侧外
          targetX = btnCenterX - (btnCenterX + 100) * progress;
          targetY = btnCenterY - 10;
        } else {
          // 动画结束
          clearInterval(animationInterval);
        }
      }, 30);
    }

    // 订阅按钮功能
    function setupSubscribeButton() {
      const subscribeBtn = document.getElementById('subscribeBtn');
      let isSubscribed = false;

      subscribeBtn.addEventListener('click', () => {
        isSubscribed = !isSubscribed;
        if (isSubscribed) {
          subscribeBtn.classList.add('subscribed');
          subscribeBtn.textContent = '已关注';
        } else {
          subscribeBtn.classList.remove('subscribed');
          subscribeBtn.textContent = '+ 关注';
        }
      });
    }

    // 页面加载完成后执行
    window.addEventListener('load', () => {
      updateCursor();
      setupSubscribeButton();
      setTimeout(autoCursorAnimation, 2000); // 延迟2秒开始动画
    });
  </script>
</body>
</html>
