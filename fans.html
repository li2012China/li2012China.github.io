<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>马太Matthew - 粉丝数</title>
    <link rel="icon" type="image/jpeg" href="https://i1.hdslb.com/bfs/face/5fa554d57cacc287756a5f5efa3d31e78a9b8ced.jpg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 顶栏 -->
    <nav class="top-bar">
      <div class="top-bar-content">
        <a href="index.html" class="top-bar-logo">
          <img src="https://i1.hdslb.com/bfs/face/5fa554d57cacc287756a5f5efa3d31e78a9b8ced.jpg" alt="马太Matthew" />
          <span>马太Matthew</span>
        </a>
        <div class="top-bar-nav">
          <a href="index.html">主页</a>
          <a href="fans.html" class="active">小目标</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <!-- 头部 -->
      <header class="fans-header">
        <h1>小目标</h1>
      </header>

      <!-- 粉丝数显示 -->
      <section class="fan-count-section">
        <div class="fan-number" id="fanCount">-</div>
        <div class="fan-label">当前粉丝数</div>
      </section>

      <!-- 进度条 -->
      <section class="progress-section">
        <div class="near-goal-banner" id="nearGoalBanner">
          🎉 即将达成目标！还差一点点了！
        </div>
        <div class="progress-info">
          <div class="progress-current">
            <span id="currentFans">-</span> 粉丝
          </div>
          <div class="progress-target">
            目标: <span id="targetFans">-</span>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-percentage" id="progressPercentage">0%</div>
      </section>

      <!-- 状态 -->
      <section class="status-section">
        <div class="status-text" id="statusText">正在获取数据...</div>
      </section>

      <!-- 返回链接 -->
      <div class="back-link">
        <a href="index.html">← 返回主页</a>
      </div>

      <!-- 页脚 -->
      <footer class="footer">
        <p>© <span id="year"></span> 马太Matthew</p>
      </footer>
    </div>

    <script>
      // 设置年份
      document.getElementById('year').textContent = new Date().getFullYear();

      // 计算目标粉丝数 - 永远比当前多一点点，永远无法达成
      function calculateTarget(currentFans) {
        // 根据当前粉丝数量级，计算下一个"好看"的整数目标
        let target;
        if (currentFans < 10) {
          target = 10;
        } else if (currentFans < 100) {
          // 下一个整十
          target = Math.ceil((currentFans + 1) / 10) * 10;
        } else if (currentFans < 1000) {
          // 下一个整百
          target = Math.ceil((currentFans + 1) / 100) * 100;
        } else if (currentFans < 10000) {
          // 下一个整千
          target = Math.ceil((currentFans + 1) / 1000) * 1000;
        } else if (currentFans < 100000) {
          // 下一个整万
          target = Math.ceil((currentFans + 1) / 10000) * 10000;
        } else if (currentFans < 1000000) {
          // 下一个整十万
          target = Math.ceil((currentFans + 1) / 100000) * 100000;
        } else {
          // 下一个整百万
          target = Math.ceil((currentFans + 1) / 1000000) * 1000000;
        }
        
        // 确保目标永远比当前多（防止刚好整除的情况）
        if (target <= currentFans) {
          target = currentFans + 10;
        }
        
        return target;
      }

      // 获取粉丝数据
      async function fetchFanData() {
        const fanCountEl = document.getElementById('fanCount');
        const currentFansEl = document.getElementById('currentFans');
        const targetFansEl = document.getElementById('targetFans');
        const progressBarEl = document.getElementById('progressBar');
        const progressPercentageEl = document.getElementById('progressPercentage');
        const statusTextEl = document.getElementById('statusText');

        // 设置加载状态
        statusTextEl.innerHTML = '<span class="loading"></span> 正在获取数据...';
        statusTextEl.className = 'status-text';

        try {
          const response = await fetch('https://uapis.cn/api/v1/social/bilibili/userinfo?uid=3546739839601525');
          
          if (!response.ok) {
            throw new Error('获取数据失败');
          }

          const data = await response.json();
          const followerCount = data.follower || 0;

          // 计算目标
          const target = calculateTarget(followerCount);
          const percentage = Math.min((followerCount / target) * 100, 100).toFixed(1);
          const remaining = target - followerCount;

          // 更新显示
          fanCountEl.textContent = followerCount.toLocaleString();
          currentFansEl.textContent = followerCount.toLocaleString();
          targetFansEl.textContent = target.toLocaleString();
          progressBarEl.style.width = percentage + '%';
          progressPercentageEl.textContent = percentage + '%';

          // 检测是否即将达成目标（90%以上或剩余少于20粉丝）
          const isNearGoal = percentage >= 90 || remaining <= 20;
          const nearGoalBanner = document.getElementById('nearGoalBanner');
          
          if (isNearGoal && remaining > 0) {
            // 即将达成状态
            progressBarEl.classList.add('near-goal');
            progressPercentageEl.classList.add('near-goal');
            nearGoalBanner.classList.add('show');
            
            // 根据剩余数量显示不同的鼓励文字
            if (remaining <= 5) {
              statusTextEl.textContent = `🔥 就差 ${remaining} 个粉丝了！马上达成！`;
            } else if (remaining <= 10) {
              statusTextEl.textContent = `💪 只差 ${remaining} 个粉丝，加油！`;
            } else {
              statusTextEl.textContent = `✨ 还差 ${remaining} 个粉丝，即将达成目标！`;
            }
          } else if (remaining <= 0) {
            // 已达成
            progressBarEl.classList.remove('near-goal');
            progressPercentageEl.classList.remove('near-goal');
            nearGoalBanner.classList.remove('show');
            statusTextEl.textContent = '🎉 已达成目标！太棒了！';
          } else {
            // 普通状态
            progressBarEl.classList.remove('near-goal');
            progressPercentageEl.classList.remove('near-goal');
            nearGoalBanner.classList.remove('show');
            statusTextEl.textContent = `还需 ${remaining.toLocaleString()} 粉丝达到目标`;
          }

        } catch (error) {
          statusTextEl.textContent = '获取数据失败，请稍后重试';
          statusTextEl.className = 'status-text error-message';
          console.error('Error fetching fan data:', error);
        }
      }

      // 页面加载时自动获取数据
      document.addEventListener('DOMContentLoaded', fetchFanData);

      // 每30秒自动刷新
      setInterval(fetchFanData, 30000);
    </script>
  </body>
</html>
